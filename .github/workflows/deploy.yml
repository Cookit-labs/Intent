name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-website:
    name: Deploy Website (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TODO: add Vercel deployment step
      # - run: pnpm turbo run build --filter=@intent/website
      # - uses: amondnet/vercel-action@v25 ...

  deploy-dapp:
    name: Deploy dApp (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TODO: add Vercel deployment step for dapp