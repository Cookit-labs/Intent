[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256 }

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
local = "http://localhost:8545"

[etherscan]
arc_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${ARC_EXPLORER_URL}" }