global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'intent-backend'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'

  - job_name: 'competition-engine'
    static_configs:
      - targets: ['host.docker.internal:9001']

  - job_name: 'reputation-engine'
    static_configs:
      - targets: ['host.docker.internal:9002']